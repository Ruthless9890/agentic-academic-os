<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AcademicOS</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          base: {
            950: '#080a10',
            900: '#0d0f17',
            850: '#11141d',
            800: '#161a25',
            700: '#1e2330',
            600: '#2a3142',
          },
        },
      },
    },
  };
</script>

<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: #080a10;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #262b38; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333a4a; }

  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.35; }
    40% { transform: scale(1); opacity: 1; }
  }
  .dot-bounce { animation: dotBounce 1.2s infinite ease-in-out; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up { animation: fadeInUp 0.2s ease-out; }

  @keyframes ringPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.45); }
    50% { box-shadow: 0 0 0 5px rgba(99, 102, 241, 0); }
  }
  .ring-pulse { animation: ringPulse 1.8s infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.7s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react,env" src="app.js?v=6"></script>
</body>
</html>
